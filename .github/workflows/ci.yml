name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  lint-test-train:
    name: Lint, test, and train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify dataset integrity
        run: python data/download_data.py --check

      - name: Lint with ruff
        run: ruff check .

      - name: Build cleaned dataset
        run: python -m src.data_prep

      - name: Train models and select best
        run: python -m src.train

      - name: Run unit tests
        run: pytest -q

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/model.joblib
            models/model_metadata.json

      - name: Upload EDA figures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eda-figures
          path: reports/figures/

      - name: Upload MLflow runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlflow.db

  docker:
    name: Build, push, and smoke-test container
    needs: lint-test-train
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (amd64)
        if: runner.arch == 'X64'
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run -d --name heart-api -p 8000:8000 "$IMAGE"
          sleep 8
          bash scripts/smoke_test.sh

      - name: Container logs
        if: always()
        run: docker logs heart-api

      - name: Tear down
        if: always()
        run: docker rm -f heart-api
