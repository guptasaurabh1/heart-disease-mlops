apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-heart-api
  labels:
    app: {{ .Release.Name }}-heart-api
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-heart-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
